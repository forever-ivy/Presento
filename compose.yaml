services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: defense-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: defense_coach
      POSTGRES_USER: defense
      POSTGRES_PASSWORD: defense
    ports:
      - "55433:5432"
    volumes:
      - defense-coach-postgres18-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defense -d defense_coach"]
      interval: 5s
      timeout: 5s
      retries: 12

  notebook-rag:
    build:
      context: ./services/notebook-rag
    container_name: defense-coach-notebook-rag
    restart: unless-stopped
    environment:
      NOTEBOOK_RAG_API_KEY: ${NOTEBOOK_RAG_API_KEY:-local-dev-key}
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  defense-coach-postgres18-data:

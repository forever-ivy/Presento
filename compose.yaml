services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: defense-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: defense_coach
      POSTGRES_USER: defense
      POSTGRES_PASSWORD: defense
    ports:
      - "55433:5432"
    volumes:
      - defense-coach-postgres18-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defense -d defense_coach"]
      interval: 5s
      timeout: 5s
      retries: 12

  notebook-rag:
    build:
      context: ./services/notebook-rag
    container_name: defense-coach-notebook-rag
    restart: unless-stopped
    env_file:
      - path: ./.env.local
        required: false
    environment:
      DATABASE_URL: postgresql://defense:defense@postgres:5432/defense_coach
      LLM_QUICK_MODEL: ${LLM_QUICK_MODEL:-deepseek-v4-flash}
      LLM_MASTERY_MODEL: ${LLM_MASTERY_MODEL:-deepseek-v4-pro}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      NOTEBOOK_RAG_API_KEY: ${NOTEBOOK_RAG_API_KEY:-local-dev-key}
      NOTEBOOK_RAG_EMBEDDING_MODEL: ${NOTEBOOK_RAG_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      NOTEBOOK_RAG_RERANK_MODEL: ${NOTEBOOK_RAG_RERANK_MODEL:-ms-marco-MiniLM-L-12-v2}
      NOTEBOOK_RAG_RETRIEVAL_V2_ENABLED: ${NOTEBOOK_RAG_RETRIEVAL_V2_ENABLED:-1}
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  defense-realtime:
    build:
      context: .
      dockerfile: ./services/defense-realtime/Dockerfile
    container_name: defense-coach-realtime
    restart: unless-stopped
    env_file:
      - path: ./.env.local
        required: false
    environment:
      DATABASE_URL: postgresql://defense:defense@postgres:5432/defense_coach
      DEFENSE_REALTIME_PORT: ${DEFENSE_REALTIME_PORT:-3021}
      GLM_REALTIME_WS_URL: ${GLM_REALTIME_WS_URL:-wss://open.bigmodel.cn/api/paas/v4/realtime}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      LANGFUSE_TRACING_ENVIRONMENT: ${LANGFUSE_TRACING_ENVIRONMENT:-development}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-local}
    ports:
      - "3021:3021"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  defense-coach-postgres18-data:
